<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estiñol</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="assets/estinol.ico">
  <link rel="stylesheet" href="https://cdn.hugeicons.com/font/hgi-stroke-rounded.css" />
</head>
<body>

  <!-- Login View -->
  <div id="login-view" class="hidden">
    <div class="login-container">
      <div class="login-header">
        <img src="assets/icon.png" alt="Logo">
        <h1>Estiñol</h1>
      </div>
      
      <div id="login-error" class="error-box hidden"></div>
      
      <div class="flex-col gap-4">
        <div>
          <label class="text-muted" for="email">E-post</label>
          <input type="email" id="email" placeholder="nimi@email.ee">
        </div>
        
        <div>
          <label class="text-muted" for="password">Parool</label>
          <input type="password" id="password" placeholder="••••••••">
        </div>
        
        <div class="flex items-center gap-2">
          <input type="checkbox" id="remember-me" style="width: auto;">
          <label for="remember-me">Mäleta minu e-posti aadressi</label>
        </div>
        
        <button id="login-btn" class="btn-primary" style="margin-top: 1rem;">Logi sisse</button>
      </div>
    </div>
  </div>

  <!-- Editor View -->
  <div id="editor-view" class="hidden">
    <!-- App Bar -->
    <header class="app-bar">
      <div class="app-bar-title">
        <img src="assets/icon.png" alt="Logo">
        <span>Estiñol</span>
      </div>
      <button id="logout-btn" class="btn-text" style="color: inherit;" title="Logi välja">
        <span class="hgi-stroke hgi-rounded hgi-logout-04"></span>
      </button>
    </header>

    <!-- Main Content Layout -->
    <main class="main-content">
      
      <!-- Left Panel (Sidebar) -->
      <aside class="left-panel">
        <div class="sidebar-header">
          <div class="flex justify-between items-center mb-4">
            <select id="lang-select" class="lang-select" title="Vali keel">
              <option value="es">🇪🇸 Español</option>
              <option value="et">🇪🇪 Eesti</option>
            </select>
            <button id="new-word-btn" class="btn-primary">Uus sõna</button>
          </div>
          <div id="alphabet-container" class="alphabet-grid">
            <!-- Alphabet buttons will be rendered here via JS -->
          </div>
        </div>
        
        <div id="word-list" class="word-list">
          <!-- Word items will be rendered here via JS -->
        </div>

        <div class="sidebar-footer">
          Sõnu tähega "<span id="selected-letter-display">A</span>": <span id="letter-word-count">0</span>
        </div>
      </aside>

      <!-- Right Panel (Editor) -->
      <section class="right-panel">
        
        <!-- Nupp "Tagasi", mis on nähtav vaid kitsal ekraanil -->
        <button id="btn-back-to-list" class="btn-text mobile-only-btn" style="align-self: flex-start; margin-bottom: 1rem; display: none;"><span class="hgi-stroke hgi-rounded hgi-circle-arrow-left-01"></span>Tagasi nimekirja</button>

        <div id="empty-state" class="empty-state">
          Vali sõna või lisa uus
        </div>

        <div id="editor-form" class="hidden flex-col flex-1">
          <div id="duplicate-warning" class="error-box hidden" style="text-align: left; display: flex; align-items: center; gap: 0.5rem;">
            ⚠️ See sõna on juba sõnastikus olemas!
          </div>

          <div class="flex gap-4 m-b-4">
            <div class="flex-1">
              <label class="text-muted bold">Algvorm</label>
              <input type="text" id="algvorm-input" autocomplete="off">
            </div>
            <div class="flex-1">
              <label class="text-muted bold">Otsinguvorm</label>
              <input type="text" id="otsingvorm-input" readonly>
            </div>
          </div>

          <div class="m-b-4">
            <label class="text-muted bold m-b-4" style="display:block">Raskusaste</label>
            <div class="segmented-btn-group" id="raskusaste-group">
              <button class="segment-btn selected" data-value="0">Määramata</button>
              <button class="segment-btn" data-value="1">Kerge</button>
              <button class="segment-btn" data-value="2">Keskmine</button>
              <button class="segment-btn" data-value="3">Raske</button>
            </div>
          </div>

          <div class="toolbar">
            <button id="btn-bold" class="btn-outline" title="Bold"><b>B</b></button>
            <button id="btn-italic" class="btn-outline" title="Italic"><i>I</i></button>
            <div style="flex: 1;"></div>
            <button id="btn-toggle-html" class="btn-text" style="font-size: 0.85rem;">Näita HTML-i</button>
          </div>

          <div class="editor-main-area">
            <div id="sisu-input" contenteditable="true" data-placeholder="Kirjuta tekst siia..."></div>
          <textarea id="sisu-html-source" class="hidden" placeholder="<p>HTML kood...</p>"></textarea>
            
            </div>
          </div>

          <div class="action-bar">
            <button id="btn-delete" class="btn-error-text hidden">Kustuta</button>
            <div style="flex: 1;"></div>
            <button id="btn-cancel" class="btn-text hidden">Katkesta</button>
            <button id="btn-save" class="btn-primary" disabled>Salvesta muudatused</button>
          </div>
        </div>

      </section>

    </main>

    <!-- Footer -->
    <footer class="app-footer">
      <div class="flex items-center">
        <span class="bold">Keel:</span>&nbsp;<span id="footer-lang">Hispaania</span> &nbsp;|&nbsp;
        <span class="bold">Sõnu:</span>&nbsp;<span id="footer-total-words">0</span> &nbsp;|&nbsp;
        
        
        <button id="btn-download-db" class="btn-text" style="padding: 0 0.5rem; font-size: inherit;" title="Laadi andmebaas alla"><span class="hgi-stroke hgi-rounded hgi-book-download"></span>DB</button>&nbsp;|&nbsp;


        <a href="../estinol.apk"><button id="btn-download-apk" class="btn-text" style="padding: 0 0.5rem; font-size: inherit;" title="Laadi äpp alla"><span class="hgi-stroke hgi-rounded hgi-download-square-02"></span>APK</button></a>
      </div>
      <div class="flex items-center">
        <!--<span id="network-status" class="status-indicator online" title="Internet on olemas"></span>-->
      </div>
    </footer>
    <div class="app-footer">
      <div class="flex items-center">
        <span class="hgi-stroke hgi-rounded hgi-calendar-03">&nbsp;</span>
        <span class="bold">Viimati muudetud:</span>&nbsp;<span id="footer-last-modified">-</span>
      </div>
    </div>
  </div>

  <!-- Global Loader -->
  <div id="global-loader" class="hidden">
    Laen andmeid...
  </div>

  <!-- Dialog Overlay -->
  <div id="dialog-overlay" class="modal-overlay hidden">
    <div class="modal-content">
      <h3 id="dialog-title">Kinnitus</h3>
      <p id="dialog-message">Kas oled kindel?</p>
      <div class="modal-actions">
        <button id="dialog-btn-cancel" class="btn-outline">Tühista</button>
        <button id="dialog-btn-confirm" class="btn-error">Kinnita</button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <!-- Firebase JS SDK (Modular v9) is loaded in firebase-config.js via CDN -->
  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/app.js"></script>

</body>
</html>
